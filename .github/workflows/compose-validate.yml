name: Compose Validation

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  validate-compose:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare test environment
        shell: bash
        run: |
          set -euo pipefail

          ln -sf .env.test .env

          set -a
          source .env
          set +a

          openssl req -x509 -newkey rsa:2048 -nodes \
            -keyout key.pem -out cert.pem \
            -days 1 \
            -subj "/CN=${EMQX_HOST}" \
            -addext "subjectAltName=DNS:${EMQX_HOST},DNS:localhost,IP:127.0.0.1" \
            -addext "basicConstraints=CA:FALSE" \
            -addext "keyUsage=digitalSignature,keyEncipherment" \
            -addext "extendedKeyUsage=serverAuth"

          chmod 0600 key.pem

      - name: Render compose config
        run: docker compose config

      - name: Start stack
        run: docker compose up -d

      - name: Wait for services to become healthy
        shell: bash
        run: |
          set -euo pipefail

          wait_for_service() {
            local service="$1"
            local timeout_secs="$2"
            local start_ts
            local container_id
            local state
            local health

            start_ts="$(date +%s)"
            container_id="$(docker compose ps -q "$service")"

            if [ -z "$container_id" ]; then
              echo "No container found for service: $service"
              return 1
            fi

            while true; do
              state="$(docker inspect --format '{{.State.Status}}' "$container_id")"
              health="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$container_id")"

              echo "$service state=$state health=$health"

              if [ "$state" = "running" ] && [ "$health" = "healthy" ]; then
                return 0
              fi

              if [ "$state" = "exited" ] || [ "$state" = "dead" ]; then
                echo "$service is not running"
                return 1
              fi

              if [ "$(($(date +%s) - start_ts))" -ge "$timeout_secs" ]; then
                echo "Timed out waiting for $service"
                return 1
              fi

              sleep 5
            done
          }

          wait_for_service emqx 120
          wait_for_service floodgate 120

      - name: Register ExHook
        run: ./register-exhook.sh

      - name: Show compose status
        if: always()
        run: docker compose ps

      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs --no-color

      - name: Tear down stack
        if: always()
        run: docker compose down -v
