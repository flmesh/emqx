channel_policy: "blacklist"
channel_blacklist:
  - "LongTurbo"
  - "LongFast"
  - "LongModerate"
  - "MediumFast"
  - "MediumSlow"
  - "ShortFast"
  - "ShortSlow"
  - "ShortTurbo"
  - "telemetry"
grpc_port: 9000
health_port: 8080
topic_filter: "msh/#"
stats_interval_s: 60
log_level: "INFO"
log_format: "json"
