services:
  emqx:
    image: emqx/emqx:6.2.0
    restart: unless-stopped
    environment:
      EMQX_AUTHENTICATION__2__USERNAME: ${MONGO_EMQX_USER}
      EMQX_AUTHENTICATION__2__PASSWORD: ${MONGO_EMQX_PASS}
      EMQX_AUTHORIZATION__SOURCES__1__USERNAME: ${MONGO_EMQX_USER}
      EMQX_AUTHORIZATION__SOURCES__1__PASSWORD: ${MONGO_EMQX_PASS}
    group_add:
      - "110"           # add ssl-certs secondary group for Let's Encrypt keys
    ports:
      - "1883:1883"     # MQTT
      - "8883:8883"     # MQTT-TLS
      - "8083:8083"     # WebSocket
      - "8084:8084"     # WebSocket-TLS
      - "127.0.0.1:18083:18083"   # dashboard: proxied through Apache
    env_file:
      - .env
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-logs:/opt/emqx/log
      - ./emqx.conf:/opt/emqx/etc/emqx.conf:ro
      - ${CERT_PEM_PATH}:/opt/emqx/etc/certs/cert.pem:ro
      - ${KEY_PEM_PATH}:/opt/emqx/etc/certs/key.pem:ro
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 25s
      retries: 5
    depends_on:
      floodgate:
        condition: service_healthy
      mongodb:
        condition: service_healthy
        required: false
    networks:
      emqx-bridge:
        aliases:
          - ${EMQX_HOST:-emqx}

  floodgate:
    image: ghcr.io/eric-becker/floodgate:0.2.1
    restart: unless-stopped
    volumes:
      - ./floodgate-config.yaml:/app/config.yaml:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      emqx-bridge:

  mongodb:
    image: mongo:8.0
    profiles:
      - mongodb
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - mongodb-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand({ ping: 1 })"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    networks:
      emqx-bridge:
    ports:
      - "127.0.0.1:27017:27017"

volumes:
  emqx-data:
  emqx-logs:
  mongodb-data:

networks:
  emqx-bridge:
