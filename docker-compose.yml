services:
  emqx:
    image: emqx/emqx:6.1.1
    restart: unless-stopped
    group_add:
      - "110"           # add ssl-certs secondary group for Let's Encrypt keys
    ports:
      - "1883:1883"     # MQTT
      - "8883:8883"     # MQTT-TLS
      - "8083:8083"     # WebSocket
      - "8084:8084"     # WebSocket-TLS
      - "127.0.0.1:18083:18083"   # dashboard: proxied through Apache
    env_file:
      - .env
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-logs:/opt/emqx/log
      - ./emqx.conf:/opt/emqx/etc/emqx.conf
      - ${CERT_PEM_PATH}:/opt/emqx/etc/certs/cert.pem
      - ${KEY_PEM_PATH}:/opt/emqx/etc/certs/key.pem
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 25s
      retries: 5
    networks:
      emqx-bridge:
        aliases:
          - ${EMQX_HOST:-emqx}

  floodgate:
    image: ghcr.io/eric-becker/floodgate:0.2.0
    restart: unless-stopped
    volumes:
      - ./floodgate-config.yaml:/app/config.yaml:ro
    depends_on:
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks:
      emqx-bridge:

volumes:
  emqx-data:
  emqx-logs:

networks:
  emqx-bridge:
