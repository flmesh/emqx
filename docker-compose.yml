services:
  emqx:
    image: emqx/emqx:6.1.1
    restart: unless-stopped
    hostname: mqtt.areyoumeshingwith.us
    group_add:
      - "110"           # add ssl-certs secondary group for Let's Encrypt keys
    ports:
      - "1883:1883"     # MQTT
      - "8883:8883"     # MQTT-TLS
      - "8083:8083"     # WebSocket
      - "8084:8084"     # WebSocket-TLS
      - "127.0.0.1:18083:18083"   # dashboard: proxied through Apache
    env_file:
      - .env
    volumes:
      - ./data:/opt/emqx/data
      - ./logs:/opt/emqx/log
      - ./emqx.conf:/opt/emqx/etc/emqx.conf
      - /var/lib/acme/live/${EMQX_HOST}/fullchain:/opt/emqx/etc/certs/cert.pem
      - /var/lib/acme/live/${EMQX_HOST}/privkey:/opt/emqx/etc/certs/key.pem
    healthcheck:
      test: ["CMD", "/opt/emqx/bin/emqx", "ctl", "status"]
      interval: 5s
      timeout: 25s
      retries: 5

  emqx-migrate:
    profiles: ["migrate"]
    image: alpine:3.22
    restart: "no"
    command:
      - /bin/sh
      - -ec
      - |
        copy_if_needed() {
          src="$$1"
          dest="$$2"
          label="$$3"

          if [ ! -d "$$src" ]; then
            echo "Skipping $$label: source directory $$src does not exist"
            return 0
          fi

          if [ -n "$$(ls -A "$$dest" 2>/dev/null)" ]; then
            echo "Skipping $$label: destination $$dest is not empty"
            return 0
          fi

          echo "Copying $$label from $$src to $$dest"
          cp -a "$$src"/. "$$dest"/
        }

        copy_if_needed /legacy/data /opt/emqx/data data
        copy_if_needed /legacy/log /opt/emqx/log log

        echo "Migration complete"
    volumes:
      - emqx-data:/opt/emqx/data
      - emqx-logs:/opt/emqx/log
      - ${LEGACY_DATA_DIR:-./data}:/legacy/data:ro
      - ${LEGACY_LOG_DIR:-./logs}:/legacy/log:ro

  floodgate:
    image: ghcr.io/eric-becker/floodgate:0.2.0
    restart: unless-stopped
    volumes:
      - ./floodgate-config.yaml:/app/config.yaml:ro
    depends_on:
      emqx:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  emqx-data:
  emqx-logs:
