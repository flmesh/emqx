## Place read-only configurations in this file.
## To define configurations that can later be overridden through UI/API/CLI, add them to `etc/base.hocon`.
##
## Config precedence order:
##   etc/base.hocon < cluster.hocon < emqx.conf < environment variables
##
## See https://docs.emqx.com/en/enterprise/latest/configuration/configuration.html for more information.
## Configuration full example can be found in etc/examples

node {
  name = "emqx@127.0.0.1"
  cookie = "emqx50elixir"
  data_dir = "data"
}

cluster {
  name = emqxcl
  discovery_strategy = manual
}

dashboard {
    listeners {
        http.bind = 18083
        # https.bind = 18084
        https {
            ssl_options {
                certfile = "${EMQX_ETC_DIR}/certs/cert.pem"
                keyfile = "${EMQX_ETC_DIR}/certs/key.pem"
            }
        }
    }
}

authentication = [
  {
    backend = mongodb
    enable = true
    mechanism = password_based

    password_hash_algorithm {
      name = sha256,
      salt_position = suffix
    }

    filter {
      status = "active"
      username = "${username}"
    }

    # Hubot/MongoDB-managed end-user client IDs:
    # - Meshtastic{Python|Apple|Android}MqttProxy-<hex-nodeid>
    # - Meshtastic{Python|Apple|Android}MqttProxy-!<hex-nodeid>
    # - Meshtastic{Python|Apple|Android}MqttProxy-paho<digits>
    # - meshpoint-<hex-nodeid>
    # - !<hex-nodeid>
    precondition = "regex_match(clientid, '^(Meshtastic(Python|Apple|Android)MqttProxy-(!?[A-Fa-f0-9]+|paho[0-9]+)|meshpoint-[A-Fa-f0-9]+|![A-Fa-f0-9]+)$')"

    mongo_type = single
    server = "mongodb:27017"

    srv_record = false
    ssl {
      enable = false
      middlebox_comp_mode = true
      verify = verify_peer
    }
    topology {
      connect_timeout_ms = "20s"
    }

    clientid_override_field = clientid_override
    is_superuser_field = is_superuser
    password_hash_field = password_hash
    salt_field = salt

    pool_size = 8
    use_legacy_protocol = auto
  },
  {
    backend = built_in_database
    enable = true
    mechanism = password_based
    password_hash_algorithm {
      iterations = 101
      mac_fun = sha512
      name = pbkdf2
    }
    user_id_type = username
  }
]

authorization {
  cache {
    enable = true
    excludes = []
    max_size = 32
    ttl = "1m"
  }
  deny_action = ignore
  include_mountpoint = false
  no_match = deny
  node_cache {
    cache_ttl = "1m"
    enable = true
    max_count = 1000000
    max_memory = "100MB"
  }
  sources = [
    {
      type = mongodb
      enable = true

      filter {
        username = "${username}"
      }

      mongo_type = single
      server = "mongodb:27017"

      limit = 1000
      pool_size = 8
      skip = 0
      srv_record = false
      ssl {
        ciphers = []
        depth = 10
        enable = false
        hibernate_after = "5s"
        log_level = notice
        middlebox_comp_mode = true
        reuse_sessions = false
        secure_renegotiate = true
        verify = verify_peer
        versions = [
          "tlsv1.3",
          "tlsv1.2"
        ]
      }
      topology {
        connect_timeout_ms = "20s"
        heartbeat_frequency_ms = "200s"
        max_overflow = 0
      }
      use_legacy_protocol = auto
    },
    {
      enable = true
      path = "${EMQX_ETC_DIR}/acl.conf"
      type = file
    }
  ]
}
