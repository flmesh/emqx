## Place read-only configurations in this file.
## To define configurations that can later be overridden through UI/API/CLI, add them to `etc/base.hocon`.
##
## Config precedence order:
##   etc/base.hocon < cluster.hocon < emqx.conf < environment variables
##
## See https://docs.emqx.com/en/enterprise/latest/configuration/configuration.html for more information.
## Configuration full example can be found in etc/examples

node {
  name = "emqx@127.0.0.1"
  cookie = "emqx50elixir"
  data_dir = "data"
}

cluster {
  name = emqxcl
  discovery_strategy = manual
}

dashboard {
    listeners {
        http.bind = 18083
        # https.bind = 18084
        https {
            ssl_options {
                certfile = "${EMQX_ETC_DIR}/certs/cert.pem"
                keyfile = "${EMQX_ETC_DIR}/certs/key.pem"
            }
        }
    }
}

authentication = [
  {
    checks = [
      {
        is_match = [
          "str_eq(username, 'uplink')",
          "regex_match(clientid, '^(MeshtasticPythonMqttProxy-[A-Za-z0-9!_-]+|MeshtasticAppleMqttProxy-[A-Za-z0-9!_-]+|MeshtasticAndroidMqttProxy-[A-Za-z0-9!_-]+|![A-Za-z0-9]+)$')"
        ]
        result = ignore
      },
      {
        is_match = "str_eq(username, 'uplink')"
        result = deny
      },
      {
        is_match = [
          "str_eq(username, 'bridge_meshstuff')",
          "str_eq(clientid, 'meshstuff.bridge-to-flmesh')"
        ]
        result = ignore
      },
      {
        is_match = "str_eq(username, 'bridge_meshstuff')"
        result = deny
      },
      {
        is_match = [
          "str_eq(username, 'bridge_core_mosquitto')",
          "str_eq(clientid, 'core-mosquitto.bridge_to_flmesh')"
        ]
        result = ignore
      },
      {
        is_match = "str_eq(username, 'bridge_core_mosquitto')"
        result = deny
      },
      {
        is_match = [
          "str_eq(username, 'bridge_zgw')",
          "str_eq(clientid, 'zgw.meshtastic_upstream')"
        ]
        result = ignore
      },
      {
        is_match = "str_eq(username, 'bridge_zgw')"
        result = deny
      },
      {
        is_match = [
          "str_eq(username, 'bridge_scmqtt')",
          "str_eq(clientid, 'scmqtt.mqtt_areyoumeshingwith_us')"
        ]
        result = ignore
      },
      {
        is_match = "str_eq(username, 'bridge_scmqtt')"
        result = deny
      }
    ]
    enable = false
    mechanism = cinfo
  },
  {
    enable = true
    backend = mongodb
    clientid_override_field = clientid_override
    filter {
      username = "${username}"
    }
    is_superuser_field = is_superuser
    mechanism = password_based
    mongo_type = single
    password_hash_algorithm {name = sha256, salt_position = suffix}
    password_hash_field = password_hash
    pool_size = 8
    salt_field = salt
    server = "mongodb:27017"
    srv_record = false
    ssl {
      enable = false
      middlebox_comp_mode = true
      verify = verify_peer
    }
    topology {
      connect_timeout_ms = "20s"
    }
    use_legacy_protocol = auto
  },
  {
    backend = built_in_database
    enable = true
    mechanism = password_based
    password_hash_algorithm {
      iterations = 101
      mac_fun = sha512
      name = pbkdf2
    }
    user_id_type = username
  }
]

authorization {
  cache {
    enable = true
    excludes = []
    max_size = 32
    ttl = "1m"
  }
  deny_action = ignore
  include_mountpoint = false
  no_match = deny
  node_cache {
    cache_ttl = "1m"
    enable = true
    max_count = 1000000
    max_memory = "100MB"
  }
  sources = [
    {
      enable = true
      filter {
        username = "${username}"
      }
      limit = 1000
      mongo_type = single
      pool_size = 8
      server = "mongodb:27017"
      skip = 0
      srv_record = false
      ssl {
        ciphers = []
        depth = 10
        enable = false
        hibernate_after = "5s"
        log_level = notice
        middlebox_comp_mode = true
        reuse_sessions = false
        secure_renegotiate = true
        verify = verify_peer
        versions = [
          "tlsv1.3",
          "tlsv1.2"
        ]
      }
      topology {
        connect_timeout_ms = "20s"
        heartbeat_frequency_ms = "200s"
        max_overflow = 0
      }
      type = mongodb
      use_legacy_protocol = auto
    },
    {
      enable = true
      path = "${EMQX_ETC_DIR}/acl.conf"
      type = file
    }
  ]
}
